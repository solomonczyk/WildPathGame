<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            /* Force exact 390x844 dimensions for viewing context */
            width: 390px;
            height: 844px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .environment-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .hotspot-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            80%, 100% { transform: scale(1.5); opacity: 0; }
        }

        .hotspot-line {
            position: absolute;
            background-color: theme('colors.primary-fixed-dim');
            height: 1px;
            z-index: 10;
        }
        
        /* Specific Hotspot Adjustments */
        .hs-1 { top: 60%; left: 20%; }
        .hs-2 { top: 25%; left: 25%; }
        .hs-3 { top: 30%; right: 20%; }
        .hs-4 { top: 65%; right: 25%; }
    </style>
