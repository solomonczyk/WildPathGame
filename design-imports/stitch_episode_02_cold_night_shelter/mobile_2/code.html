            display: flex;
            flex-direction: column;

            top: 0;
            left: 0;

        }

            0% { transform: scale(0.8); opacity: 0.8; }

        }

            position: absolute;
            background-color: theme('colors.primary-fixed-dim');
            height: 1px;
            z-index: 10;
        }

        .hs-1 { top: 60%; left: 20%; }
