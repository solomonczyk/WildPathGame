<template id="detail-template">

</div>

<span class="material-symbols-outlined text-[14px]">weight</span> <span id="detail-weight">1.2 kg</span>
</span>

</div>
</div>
<div>
<h4 class="font-label-caps text-label-caps text-outline mb-2">DESCRIPTION</h4>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed" id="detail-desc">
                        A heavy, insulated jacket. It smells faintly of mothballs but offers excellent protection against severe hypothermia. Essential for moving outside during the night cycle.
                    </p>

<!-- Actions -->
<div class="p-6 border-t border-surface-variant bg-surface-container-lowest flex gap-3">
<button class="flex-1 bg-surface-container border border-outline-variant text-on-surface font-body-md text-body-md font-bold py-3 px-4 hover:bg-surface-variant hover:border-secondary transition-colors" onclick="takeItem()">
                    TAKE
                </button>
<button class="flex-1 bg-surface-container-lowest border border-outline-variant text-outline font-body-md text-body-md font-bold py-3 px-4 hover:bg-surface-container hover:text-on-surface transition-colors" onclick="closeDetailPanel()">
                    LEAVE
                </button>
</div>
</div>

<script>
        // Simulated Data
        const itemsData = {
            'jacket': {
                name: 'Warm Jacket', icon: 'apparel', category: 'Warmth', categoryIcon: 'local_fire_department', 
                weight: 1.2, value: 4, desc: 'A heavy, insulated jacket. It smells faintly of mothballs but offers excellent protection against severe hypothermia. Essential for moving outside during the night cycle.'
            },
            'hat': {
                name: 'Winter Hat', icon: 'snowing', category: 'Warmth', categoryIcon: 'local_fire_department', 
                weight: 0.3, value: 2, desc: 'A simple knit cap. Helps retain body heat in cold environments. Lightweight and easy to pack.'
            },
            'shoes': {
                name: 'Spare Shoes', icon: 'steps', category: 'Tool', categoryIcon: 'build', 
                weight: 0.8, value: 3, desc: 'Sturdy boots. Can be used to replace worn footwear or traded. Slightly bulky.'
            },
            'blanket': {
                name: 'Heavy Blanket', icon: 'bed', category: 'Warmth', categoryIcon: 'local_fire_department', 
                weight: 2.5, value: 5, desc: 'A thick wool blanket. Exceptional warmth but very heavy. Best used for establishing a safe room rather than carrying.'
            },
            'decorative': {
                name: 'Fancy Suit', icon: 'checkroom', category: 'Trap', categoryIcon: 'warning', 
                weight: 1.5, value: 0, desc: 'A tailored suit. Looks nice but offers zero thermal protection and restricts movement. Dead weight.'
            }
        };

        let currentSelectedWeight = 0;
        let totalWeight = 0;
        const maxWeight = 8.0;

        function selectItem(itemId, element) {
            // UI Selection State
            document.querySelectorAll('.item-card').forEach(el => {
                el.classList.remove('glow-active', 'border-secondary');
            });
            element.classList.add('glow-active');

            const item = itemsData[itemId];
            currentSelectedWeight = item.weight;

            // Populate Detail Panel
            const panel = document.getElementById('item-detail-panel');
            const template = document.getElementById('detail-template').content.cloneNode(true);
            
            // Fill template data
            template.getElementById('detail-icon').textContent = item.icon;
            template.getElementById('detail-name').textContent = item.name;
            template.getElementById('detail-category').textContent = item.category;
            template.getElementById('detail-weight').textContent = item.weight.toFixed(1) + ' kg';
            template.getElementById('detail-desc').textContent = item.desc;

            // Category Styling
            const catSpan = template.getElementById('detail-category').parentElement;
            if(item.category === 'Trap') {
                catSpan.className = 'px-2 py-1 bg-error-container text-on-error-container border border-error/30 rounded font-stat-sm text-stat-sm flex items-center gap-1';
            }

            // Value Indicator
            const valueInd = template.getElementById('detail-value-indicator');
            for(let i=0; i<5; i++) {
                const bar = document.createElement('div');
                bar.className = `h-2 w-8 border border-outline-variant ${i < item.value ? 'bg-tertiary' : 'bg-surface-container-low'}`;
                if(item.category === 'Trap' && i < 1) bar.className = 'h-2 w-8 border border-outline-variant bg-error';
                valueInd.appendChild(bar);
            }

            // Show Panel
            panel.innerHTML = '';
            panel.appendChild(template);
            
            // Mobile handling: show as bottom sheet
            panel.classList.remove('hidden');
            if (window.innerWidth < 768) {
                panel.classList.add('fixed', 'bottom-[60px]', 'h-[530px]', 'rounded-t-xl', 'border-t', 'shadow-[0_-10px_40px_rgba(0,0,0,0.8)]');
            }
        }

        function closeDetailPanel() {
             const panel = document.getElementById('item-detail-panel');
             if (window.innerWidth < 768) {
                 panel.classList.add('hidden');
                 panel.classList.remove('fixed', 'bottom-[60px]', 'h-[530px]', 'rounded-t-xl', 'border-t', 'shadow-[0_-10px_40px_rgba(0,0,0,0.8)]');
             } else {
                 panel.innerHTML = '<div class="flex-1 flex items-center justify-center text-outline font-stat-sm text-stat-sm p-8 text-center border-b border-surface-variant">Select an item to inspect.</div>';
             }
             
             document.querySelectorAll('.item-card').forEach(el => {
                el.classList.remove('glow-active');
            });
            currentSelectedWeight = 0;
        }

        function takeItem() {
            if (totalWeight + currentSelectedWeight <= maxWeight) {
                totalWeight += currentSelectedWeight;
                updateBackpack();
                
                // Hide the selected item visually (simulate taking it)
                const activeCard = document.querySelector('.glow-active');
                if(activeCard) {
                    activeCard.style.opacity = '0.3';
                    activeCard.style.pointerEvents = 'none';
                    activeCard.classList.remove('glow-active');
                }
                closeDetailPanel();
            } else {
                // Visual feedback for over capacity
                const bar = document.getElementById('capacity-bar');
                bar.classList.replace('bg-tertiary', 'bg-error');
                setTimeout(() => {
                    bar.classList.replace('bg-error', 'bg-tertiary');
                }, 500);
            }
        }

        function updateBackpack() {
            const percentage = (totalWeight / maxWeight) * 100;
            const bar = document.getElementById('capacity-bar');
            bar.style.width = `${percentage}%`;
            
            if(percentage > 80) {
                bar.classList.replace('bg-tertiary', 'bg-secondary');
            }
            
            document.getElementById('current-weight').textContent = totalWeight.toFixed(1);
        }

        function closeContainer() {
            // Visual feedback for closing
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                console.log('Returning to game view...');
            }, 300);
        }
        
        // Add minimal CSS animation for fade in
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

    </script>
